groups:
  - name: sre_automation_alerts
    rules:
      # Alert for high CPU usage (Criterion 4.2.3.2.a)
      - alert: HighCpuUsage
        expr: container_cpu_usage_seconds_total > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected on {{ $labels.instance }}"
          description: "CPU usage is above 80% for more than 1 minute."

      # Alert for service downtime (Criterion 4.2.3.2.b)
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Microservice has been unavailable for more than 30 seconds."

      # Alert for increased error rates (Criterion 4.2.3.2.c)
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "More than 5% of requests are failing with 5xx errors."
